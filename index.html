<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <title>Vecto — Performance with Direction</title>
    <meta name="description" content="Vecto — The accountability engine for independent fitness trainers. Track workouts, meals, and client compliance." />
    <meta name="author" content="Vecto" />

    <!-- Theme Color for browser chrome -->
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json?v=20260429a" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180.png?v=20260429a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Vecto" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png?v=20260429a" />

    <script>
      window.__vectoFreshnessReady = (async function () {
        const refreshKey = "vecto:html-build-refresh-attempted";
        const storedBuildKey = "vecto:html-build-id";
        try {
          const response = await fetch("/build-id.json?t=" + Date.now(), {
            cache: "no-store",
            headers: { "cache-control": "no-cache" }
          });
          if (!response.ok) return;

          const payload = await response.json();
          const latestBuildId = payload && payload.buildId;
          if (!latestBuildId) return;

          const previousBuildId = localStorage.getItem(storedBuildKey);
          localStorage.setItem(storedBuildKey, latestBuildId);

          if (!previousBuildId || previousBuildId === latestBuildId) return;
          if (sessionStorage.getItem(refreshKey) === latestBuildId) return;
          sessionStorage.setItem(refreshKey, latestBuildId);

          if ("caches" in window) {
            const cacheNames = await caches.keys();
            await Promise.all(cacheNames.map((cacheName) => caches.delete(cacheName)));
          }

          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }

          const url = new URL(window.location.href);
          url.searchParams.set("vecto_fresh", String(Date.now()));
          window.location.replace(url.toString());
        } catch (_) {
          // Never block app boot if the freshness probe itself fails.
        }
      })();
    </script>

    <!-- Open Graph -->
    <meta property="og:title" content="Vecto — Performance with Direction" />
    <meta property="og:description" content="The accountability engine for independent fitness trainers. Track workouts, meals, and client compliance." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vecto" />
    <meta name="twitter:description" content="The accountability engine for independent fitness trainers." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Preload Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>

  <body class="dark">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
